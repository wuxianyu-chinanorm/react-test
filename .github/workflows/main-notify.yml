name: Notify on main update

on:
  push:
    branches: [main]

jobs:
  notify-server:
    runs-on: ubuntu-latest
    steps:
      - name: Check reachability of test-guide.data-infact.com
        run: |
          set -e
          echo "Resolving hostname..."
          getent hosts test-guide.data-infact.com || { echo "::error::DNS lookup failed for test-guide.data-infact.com"; exit 1; }
          echo "Checking TCP port 22..."
          timeout 5 bash -c 'cat < /dev/null > /dev/tcp/test-guide.data-infact.com/22' || { echo "::error::Cannot reach test-guide.data-infact.com:22 (SSH). Check firewall/network."; exit 1; }
          echo "Host is reachable."
      - name: SSH and touch timestamp file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: test-guide.data-infact.com
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: touch /home/wuxianyu/main_update_$(date +%Y-%m-%dT%H-%M-%S)
